  - ["racer_val"]
  - ["usc_koch_rewind"]
  - ["usc_xarm_policy_ranking"]
  - ["usc_franka_policy_ranking"]
  - ["utd_so101_policy_ranking"]
  - ["utd_so101_human"]
  #- ["roboarena_eval_debug_nowrist"]
  - ["hand_paired_robot", "hand_paired_human"]
